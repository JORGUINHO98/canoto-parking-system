version: '3.8'

services:

  app:
    build: .
    container_name: Canoto-Parking_app
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: Canoto-Parking_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: Canoto-Parking
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  # ¡NUEVO SERVICIO! Interfaz web para tu base de datos
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: Canoto-Parking_pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data: